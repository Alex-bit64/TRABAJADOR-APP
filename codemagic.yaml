workflows:
  ios-test-build:
    name: iOS Test Build Sin Firma
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Verificar Flutter
        script: flutter doctor

      - name: Instalar dependencias Flutter
        script: flutter pub get

      - name: Instalar CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Compilar iOS sin firma
        script: flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
